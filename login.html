<!doctype html>

<html lang="en">

	<head>

		<meta charset="UTF-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Shard Hosting | Login</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />

		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />

		<link rel="stylesheet" href="styles.css" />

	</head>

	<body class="page-with-nav">

		<header class="site-header">

			<div class="site-header-inner site-header-main">

				<a class="site-logo" href="/index.html" title="Home">

					<img src="/assets/logo.png" alt="Shard hosting" width="44" height="44" />

				</a>

				<nav class="site-nav-main" aria-label="Main">

					<a href="/discord-hosting.html">Discord</a>

					<a href="/support.html">Support</a>

					<a href="/dashboard.html">Dashboard</a>

				</nav>

				<a class="site-profile" href="/profile.html" aria-label="Profile">

					<img id="nav-avatar" src="/assets/default_user.png" alt="" width="40" height="40" />

				</a>

			</div>

		</header>



		<main class="shell">

			<section class="hero">

				<h1 class="brand">Shard hosting</h1>

			</section>



			<section class="login-card login-card-compact">

				<h2 class="section-title login-title" id="form-title">Sign in</h2>

				<p class="section-copy" id="form-copy">Sign in to continue to your hosting dashboard.</p>



				<form id="auth-form">

					<div id="username-field" class="hidden">

						<label for="username">Username</label>

						<input

							id="username"

							name="username"

							type="text"

							autocomplete="username"

							autocapitalize="off"

							autocorrect="off"

							spellcheck="false"

							maxlength="32"

							minlength="6"

						/>

					</div>



					<label for="email">Email</label>

					<input

						id="email"

						name="email"

						type="email"

						autocomplete="email"

						autocapitalize="off"

						autocorrect="off"

						spellcheck="false"

						required

						maxlength="320"

					/>



					<label for="password">Password</label>

					<input

						id="password"

						name="password"

						type="password"

						autocomplete="current-password"

						required

						minlength="8"

						maxlength="128"

					/>

					<div id="password-strength" class="strength hidden" aria-live="polite">

						<div class="strength-bars" role="presentation">

							<span id="strength-1"></span>

							<span id="strength-2"></span>

							<span id="strength-3"></span>

						</div>

						<p id="strength-text" class="strength-text">Weak</p>

					</div>



					<div class="row">

						<button id="submit-btn" class="primary" type="submit">Sign in</button>

						<button id="toggle-mode" class="ghost" type="button">Need an account? Sign up</button>

					</div>

				</form>



				<p class="login-divider"><span>or continue with</span></p>



				<div class="row">

					<a class="btn-discord" href="/api/auth/discord/user">

						<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">

							<path

								d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"

							/>

						</svg>

						Continue with Discord

					</a>

					<a class="btn-github" href="/api/auth/github">

						<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">

							<path

								d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.66-.22.66-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.38-3.37-1.38-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.58 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.03 1.02-2.74-.1-.26-.44-1.3.1-2.71 0 0 .84-.28 2.75 1.05a9.3 9.3 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.54 1.41.2 2.45.1 2.71.64.71 1.02 1.62 1.02 2.74 0 3.95-2.34 4.82-4.57 5.07.36.32.68.95.68 1.91 0 1.38-.01 2.49-.01 2.83 0 .27.16.6.67.49A10.18 10.18 0 0 0 22 12.25C22 6.59 17.52 2 12 2z"

							/>

						</svg>

						Continue with GitHub

					</a>

					<a class="btn-google btn-google-gray" href="/api/auth/google">

						<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">

							<path fill="#EA4335" d="M12 4.8c1.7 0 3.2.6 4.3 1.6l3.2-3.2C17.6 1.4 14.9.2 12 .2 7.5.2 3.7 2.8 1.8 6.7l3.8 2.9C6.5 6.7 9 4.8 12 4.8z" />

							<path fill="#34A853" d="M23.5 12.3c0-.8-.1-1.3-.2-1.9H12v3.7h6.5c-.1.9-.9 2.4-2.6 3.4l3.7 2.9c2.2-2.1 3.9-5.1 3.9-8.1z" />

							<path fill="#4A90E2" d="M5.6 14.4c-.3-.9-.5-1.6-.5-2.4s.2-1.6.5-2.4l-3.8-2.9C1.1 8.3.7 10.1.7 12s.4 3.7 1.1 5.3l3.8-2.9z" />

							<path fill="#FBBC05" d="M12 23.8c3.2 0 5.9-1 7.9-2.8l-3.7-2.9c-1 .7-2.4 1.2-4.2 1.2-3 0-5.5-2-6.4-4.8l-3.8 2.9c1.9 4 5.7 6.4 10.2 6.4z" />

						</svg>

						Continue with Google

					</a>

				</div>



				<p id="provider-status" class="status provider-status hidden"></p>

				<p id="status" class="status hidden"></p>

			</section>

		</main>



		<script>

			const authForm = document.getElementById("auth-form");

			const passwordInput = document.getElementById("password");

			const toggleModeButton = document.getElementById("toggle-mode");

			const submitButton = document.getElementById("submit-btn");

			const statusEl = document.getElementById("status");

			const providerStatusEl = document.getElementById("provider-status");

			const formTitle = document.getElementById("form-title");

			const formCopy = document.getElementById("form-copy");

			const strengthContainer = document.getElementById("password-strength");

			const strengthText = document.getElementById("strength-text");

			const strengthBars = [

				document.getElementById("strength-1"),

				document.getElementById("strength-2"),

				document.getElementById("strength-3"),

			];

			const usernameField = document.getElementById("username-field");

			const usernameInput = document.getElementById("username");



			let mode = "login";



			function isValidSignupUsername(value) {

				return /^[a-zA-Z0-9]{6,32}$/.test(String(value || "").trim());

			}



			function setStatus(message, type = "") {

				statusEl.textContent = message;

				statusEl.className = `status ${type}`.trim();

				if (message) {

					statusEl.classList.remove("hidden");

				} else {

					statusEl.classList.add("hidden");

				}

			}



			function normalizeEmail(email) {

				return String(email)

					.replace(/[\u200B-\u200D\uFEFF]/g, "")

					.replace(/\s+/g, "")

					.trim()

					.toLowerCase();

			}



			function isPasswordValid(password) {

				return /[A-Z]/.test(password) && /\d/.test(password) && /[^A-Za-z0-9]/.test(password) && password.length >= 8;

			}



			function getPasswordStrength(password) {

				if (!password) {

					return { level: 0, label: "Weak" };

				}

				if (!isPasswordValid(password)) {

					return { level: 1, label: "Weak" };

				}

				if (password.length >= 12) {

					return { level: 3, label: "Very Strong" };

				}

				return { level: 2, label: "Strong" };

			}



			function renderPasswordStrength() {

				const { level, label } = getPasswordStrength(passwordInput.value);

				strengthText.textContent = label;

				strengthBars.forEach((bar, index) => {

					bar.classList.toggle("active", index < level);

				});

				strengthContainer.classList.toggle("weak", level === 1);

				strengthContainer.classList.toggle("strong", level === 2);

				strengthContainer.classList.toggle("very-strong", level === 3);

			}



			function updateModeUI() {

				passwordInput.autocomplete = mode === "login" ? "current-password" : "new-password";

				if (mode === "login") {

					formTitle.textContent = "Sign in";

					formCopy.textContent = "Sign in to continue to your hosting dashboard.";

					submitButton.textContent = "Sign in";

					toggleModeButton.textContent = "Need an account? Sign up";

					usernameField.classList.add("hidden");

					usernameInput.removeAttribute("required");

					strengthContainer.classList.add("hidden");

				} else {

					formTitle.textContent = "Create account";

					formCopy.textContent = "Create your account to start managing your hosting services.";

					submitButton.textContent = "Sign up";

					toggleModeButton.textContent = "Already have an account? Sign in";

					usernameField.classList.remove("hidden");

					usernameInput.setAttribute("required", "required");

					strengthContainer.classList.remove("hidden");

					renderPasswordStrength();

				}

			}



			function toFriendlyError(error, isSignup) {

				const raw = String(error?.message || "");

				const lower = raw.toLowerCase();



				if (lower.includes("already registered") || lower.includes("already taken")) {

					if (lower.includes("username") || lower.includes("email or username")) {

						return "That email or username is already taken.";

					}

					return "That email is already registered. Try signing in instead.";

				}

				if (lower.includes("invalid email or password")) {

					return "Email or password is incorrect.";

				}

				if (lower.includes("valid email is required") || lower.includes("please enter a valid email")) {

					return "Please enter a valid email address.";

				}

				if (lower.includes("failed to fetch") || lower.includes("network")) {

					return "Network error. Check your connection and try again.";

				}

				return isSignup ? "Could not create account. Please check your details and try again." : "Could not sign in. Please try again.";

			}



			async function apiRequest(path, options = {}) {

				const response = await fetch(path, {

					credentials: "same-origin",

					headers: {

						"Content-Type": "application/json",

						...(options.headers || {}),

					},

					...options,

				});



				const payload = await response.json().catch(() => ({}));

				if (!response.ok) {

					throw new Error(payload.error || "Request failed");

				}

				return payload;

			}



			function updateProviderStatus(providers) {

				const labels = [

					{ key: "discord", label: "Discord" },

					{ key: "github", label: "GitHub" },

					{ key: "google", label: "Google" },

				];

				const disabled = labels.filter((item) => !providers[item.key]).map((item) => item.label);

				if (disabled.length === 0) {

					providerStatusEl.textContent = "";

					providerStatusEl.classList.add("hidden");

					return;

				}

				providerStatusEl.textContent = `Social sign-in not configured: ${disabled.join(", ")}.`;

				providerStatusEl.className = "status error provider-status";

				providerStatusEl.classList.remove("hidden");

			}



			async function loadProviderStatus() {

				try {

					const data = await apiRequest("/api/auth/providers", { method: "GET" });

					updateProviderStatus(data.providers || {});

				} catch {

					providerStatusEl.classList.add("hidden");

				}

			}



			async function checkExistingSession() {

				try {

					await apiRequest("/api/me", { method: "GET" });

					window.location.href = "/dashboard.html";

				} catch {

					// Stay on login page when not fully signed in.

				}

			}



			authForm.addEventListener("submit", async (event) => {

				event.preventDefault();



				const formData = new FormData(authForm);

				const email = normalizeEmail(formData.get("email") || "");

				const password = String(formData.get("password") || "");

				const endpoint = mode === "login" ? "/api/login" : "/api/register";



				if (mode === "signup" && !isPasswordValid(password)) {

					setStatus("Password must include 8+ characters, one capital letter, one number, and one symbol.", "error");

					return;

				}



				if (mode === "signup") {

					const un = String(usernameInput.value || "").trim();

					if (!isValidSignupUsername(un)) {

						setStatus("Username must be 6–32 characters, letters and numbers only (no spaces or symbols).", "error");

						return;

					}

				}



				submitButton.disabled = true;

				try {

					const payload =

						mode === "signup"

							? { email, password, username: String(usernameInput.value || "").trim().toLowerCase() }

							: { email, password };

					await apiRequest(endpoint, {

						method: "POST",

						body: JSON.stringify(payload),

					});

					window.location.href = "/dashboard.html";

				} catch (error) {

					setStatus(toFriendlyError(error, mode === "signup"), "error");

				} finally {

					submitButton.disabled = false;

				}

			});



			toggleModeButton.addEventListener("click", () => {

				mode = mode === "login" ? "signup" : "login";

				setStatus("");

				updateModeUI();

			});



			passwordInput.addEventListener("input", () => {

				if (mode === "signup") {

					renderPasswordStrength();

				}

			});



			const params = new URLSearchParams(window.location.search);

			const authError = params.get("error");

			if (authError) {

				setStatus(authError, "error");

			}



			updateModeUI();

			loadProviderStatus();

			checkExistingSession();

		</script>

		<script src="/js/site-footer.js" defer></script>

	</body>

</html>
